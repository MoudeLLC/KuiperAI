name: Automated Vocabulary Training

on:
  schedule:
    # Run every day at 2 AM UTC
    - cron: '0 2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      vocab_size:
        description: 'Vocabulary size (64000-96000)'
        required: false
        default: '80000'
      force_retrain:
        description: 'Force complete retraining'
        required: false
        default: 'false'

  # Run on push to main (for testing)
  push:
    branches:
      - main
    paths:
      - 'knowledge/**'
      - 'scripts/train_vocabulary.py'
      - '.github/workflows/train_vocabulary.yml'

jobs:
  train-vocabulary:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Cache training data
      uses: actions/cache@v4
      with:
        path: |
          knowledge/web_learned
          knowledge/downloaded_corpus
        key: training-data-${{ hashFiles('knowledge/**/*.txt') }}
        restore-keys: |
          training-data-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install tokenizers numpy requests beautifulsoup4 tqdm
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Download additional training data
      run: |
        python scripts/download_training_data.py \
          --output-dir knowledge/downloaded_corpus \
          --min-size 50000000
      continue-on-error: true
    
    - name: Train BPE vocabulary
      run: |
        VOCAB_SIZE=${{ github.event.inputs.vocab_size || '80000' }}
        python scripts/train_vocabulary.py \
          --vocab-size $VOCAB_SIZE \
          --output-dir checkpoints \
          --training-data knowledge \
          --algorithm bpe \
          --min-frequency 2
    
    - name: Validate vocabulary
      run: |
        python scripts/validate_vocabulary.py \
          --vocab-path checkpoints/vocab_bpe_80k.json \
          --test-samples 1000
    
    - name: Generate vocabulary report
      run: |
        python scripts/generate_vocab_report.py \
          --vocab-path checkpoints/vocab_bpe_80k.json \
          --output checkpoints/vocab_report.md
    
    - name: Commit and push vocabulary
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add vocabulary files (force add to override .gitignore)
        git add -f checkpoints/vocab_bpe_*.json || true
        git add -f checkpoints/tokenizer_bpe_*.json || true
        git add -f checkpoints/vocab_stats_*.json || true
        git add -f checkpoints/vocab_report.md || true
        
        # Check if there are changes
        if git diff --staged --quiet; then
          echo "No vocabulary changes to commit"
        else
          git commit -m "🤖 Auto-update vocabulary ($(date +'%Y-%m-%d'))"
          git push
        fi
    
    - name: Upload vocabulary artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vocabulary-${{ github.run_number }}
        path: |
          checkpoints/vocab_bpe_*.json
          checkpoints/tokenizer_bpe_*.json
          checkpoints/vocab_report.md
        retention-days: 30
    
    - name: Create release on major update
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.force_retrain == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: vocab-v${{ github.run_number }}
        name: Vocabulary Release ${{ github.run_number }}
        body: |
          Automated vocabulary training completed
          - Vocabulary size: ${{ github.event.inputs.vocab_size || '80000' }}
          - Training date: ${{ github.event.repository.updated_at }}
          - Algorithm: BPE (Byte-Pair Encoding)
        files: |
          checkpoints/vocab_bpe_*.json
          checkpoints/tokenizer_bpe_*.json
          checkpoints/vocab_report.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
